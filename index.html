<!DOCTYPE html>
<html>
<head>
    <title>Lazenza Kitchen</title>
    <!-- This gives our website pretty colors and styles -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-gray-800">

    <!-- 1. HEADER (The Top Banner) -->
    <header class="bg-red-600 text-white text-center py-12 shadow-md">
        <h1 class="text-4xl font-extrabold tracking-wide">🍕 LAZENZA KITCHEN 🍔</h1>
        <p class="text-lg mt-2 italic">The Yummiest Food Delivered Straight To Your WhatsApp!</p>
    </header>

    <!-- 2. THE FOOD MENU -->
    <main class="max-w-4xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-center my-6 text-red-600">Choose Your Yummy Food:</h2>
        
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Food Card 1 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden p-4 border border-gray-100">
                <!-- Change this URL to your own food picture later! -->
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" class="w-full h-40 object-cover rounded-lg">
                <h3 class="text-xl font-bold mt-2">Cheese Pizza</h3>
                <p class="text-gray-500 text-sm">Melty, gooey cheese on a crispy crust.</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-green-600 font-bold text-lg">$10.00</span>
                    <button onclick="addToCart('Cheese Pizza', 10)" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600">Add to Bag</button>
                </div>
            </div>

            <!-- Food Card 2 -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden p-4 border border-gray-100">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" class="w-full h-40 object-cover rounded-lg">
                <h3 class="text-xl font-bold mt-2">Yummy Burger</h3>
                <p class="text-gray-500 text-sm">Juicy burger with fresh lettuce and sauce.</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-green-600 font-bold text-lg">$8.00</span>
                    <button onclick="addToCart('Yummy Burger', 8)" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold hover:bg-orange-600">Add to Bag</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 3. YOUTUBE VIDEO SECTION -->
    <section class="max-w-2xl mx-auto p-6 text-center">
        <h2 class="text-2xl font-bold text-red-600 mb-4">Watch Us Cook!</h2>
        <div class="rounded-xl overflow-hidden shadow-lg aspect-video">
            <!-- Tip: Swap "dQw4w9WgXcQ" with your actual YouTube video ID! -->
            <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
        </div>
    </section>

    <!-- 4. FLOATING SHOPPING CART -->
    <div id="cart" class="fixed bottom-5 right-5 bg-white p-6 rounded-2xl shadow-2xl max-w-xs hidden border-2 border-red-500">
        <h3 class="font-bold text-lg mb-2">🛍️ Your Order:</h3>
        <div id="cart-items" class="text-sm space-y-1 mb-4"></div>
        <button onclick="sendToWhatsApp()" class="w-full bg-green-500 text-white py-2 rounded-lg font-bold shadow-md hover:bg-green-600">
            Order via WhatsApp 💬
        </button>
    </div>

    <!-- 5. THE SECRET BRAIN (JavaScript) -->
    <script>
        let bag = [];
        // ⚠️ PUT YOUR WHATSAPP NUMBER BELOW! (Country code first, no spaces, no plus signs!)
        // Example: "2348012345678" or "15551234567"
        const MY_PHONE_NUMBER = "15551234567"; 

        function addToCart(itemName, itemPrice) {
            bag.push({ name: itemName, price: itemPrice });
            showCart();
        }

        function showCart() {
            const cartDiv = document.getElementById('cart');
            const itemsDiv = document.getElementById('cart-items');
            
            cartDiv.classList.remove('hidden'); // Show the cart box
            
            let total = 0;
            itemsDiv.innerHTML = bag.map(item => {
                total += item.price;
                return `<div>• ${item.name} ($${item.price})</div>`;
            }).join('') + `<div class="font-bold mt-2 pt-2 border-t text-red-600">Total: $${total}</div>`;
        }

        function sendToWhatsApp() {
            let text = "Hello Lazenza Kitchen! I want to order:\n\n";
            let total = 0;
            
            bag.forEach(item => {
                text += `• ${item.name} ($${item.price})\n`;
                total += item.price;
            });
            text += `\n*Total Money: $${total}* \n\nPlease reply to confirm my order!`;
            
            // This turns the text into a safe internet link link
            let safeText = encodeURIComponent(text);
            window.open(`https://wa.me/${MY_PHONE_NUMBER}?text=${safeText}`, '_blank');
        }
    </script>
</body>
</html>
